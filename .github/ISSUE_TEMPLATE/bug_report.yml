name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        **Never include real passwords, vault data, or personal information.**

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Authentication (login / register / password reset)
        - Vault unlock / lock
        - Entry create / edit / delete
        - Encryption / decryption
        - UI / styling
        - Self-hosting / Docker
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Docker image tag or git commit hash
      placeholder: v0.1.2

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or console output
      description: Paste any server logs or browser console errors here.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This report contains no real passwords, tokens, or vault data.
          required: true
