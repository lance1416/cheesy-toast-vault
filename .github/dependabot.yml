version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      all:
        patterns: ["*"]
    ignore:
      # eslint-config-next controls the supported ESLint major version.
      # Only upgrade ESLint when eslint-config-next bumps its peer dep range.
      - dependency-name: eslint
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      all:
        patterns: ["*"]
